<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    
    <div class="calculator">
        <div class="header"></div>
        <div class="screen"><span id="screenText"></span></div>
        <div class="buttons">
            <div id="firstline">
            <button class="operational" id="clear" value="CE">CE</button>
            <button class="operational" id="root" value="√">√</button>
            <button class="operational" id="remainder" value="%">%</button>
            <button class="operational" id="divide" value="÷">÷</button>
           </div>
           <div id="secondline">
            <button id="seven" value="7">7</button>
            <button id="eight" value="8">8</button>
            <button id="nine" value="9">9</button>
            <button class="operational" id="multiply" value="×">×</button>
           </div>
           <div id="thirdline">
            <button id="four" value="4">4</button>
            <button id="five" value="5">5</button>
            <button id="six" value="6">6</button>
            <button class="operational" id="subtract" value="-">-</button>
           </div>
           <div id="fourthline">
            <button id="one" value="1">1</button>
            <button id="two" value="2">2</button>
            <button id="three" value="3">3</button>
            <button class="operational" id="add" value="+">+</button>
           </div>
           <div id="fifthline">
            <button id="zero" value="0">0</button>
            <button id="point" value=".">.</button>
            <button id="enter" value="=">=</button>
           </div>
        </div>
        
    </div>
    
</body>
</html>
